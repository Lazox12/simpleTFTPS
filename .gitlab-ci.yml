stages:
  - build
  - test
  - deploy

variables:
  # Twine uses these variables automatically for authentication
  TWINE_USERNAME: $TWINE_USERNAME
  TWINE_PASSWORD: $TWINE_PASSWORD

build-package:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qy
    - apt-get install -y python3-pip python3-venv build-essential
  script:
    # Build the Rust static library first as it's required by setup.py
    - cd simpleTFTPS && cargo build --release && cd ..
    # Install build tools and create the python distribution
    - pip install --break-system-packages setuptools wheel
    - python3 setup.py bdist_wheel
    - python3 setup.py sdist

  artifacts:
    paths:
      - dist/

run-tests:
  stage: test
  image: rust:latest
  before_script:
    - apt-get update -qy
    - apt-get install -y python3-pip python3-venv build-essential
  script:
    - make test

deploy-pypi:
  stage: deploy
  image: python:3.11-slim
  script:
    - pip install twine
    # Upload to PyPI, skipping if the version already exists
    - twine upload --skip-existing dist/*
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
